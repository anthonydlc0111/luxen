<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./multimedia/bombillo-w.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./styles/tipografia/tipography.css" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <title>luxen</title>
  </head>
  <body>
    <div class="bkgd-img">
      <div class="bkgd-shadow">
        <header>
          <img src="#" alt="logo" />
        </header>
        <main>
          <section class="hero">
            <div class="content-section">
              <h1>Aqui va el encabezado</h1>
              <p>aqui va el sub-encabezdo</p>
            </div>
            <div class="form-section">
              <form action="#" method="#">
                <label
                  >Nombre
                  <input
                    type="text"
                    name="nombre"
                    id="nombre"
                    placeholder="Luis veras"
                    required
                    autocomplete="given-name"
                  />
                </label>
                <label
                  >Teléfono
                  <input
                    type="tel"
                    name="phone"
                    id="phone"
                    placeholder="8294569872"
                    required
                    autocomplete="mobile"
                  />
                </label>
                <label
                  >Como te ayudamos?
                  <textarea
                    name="Comentario"
                    id="comentario"
                    placeholder="Necesito ayuda con la electricidad..."
                    required
                  ></textarea>
                </label>
                <button type="submit">Enviar</button>
              </form>
            </div>
          </section>
        </main>
      </div>
    </div>
    <a href="#" target="_blank" rel="noopener noreferrer"
      ><img src="#" alt="Whatsapp"
    /></a>
  </body>
</html>
